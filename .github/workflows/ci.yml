name: CI

on:
  push:
    branches:
      - main
      - master
      - julia-modernization-followup
      - "feature/**"
  pull_request:

jobs:
  macos-arm64:
    name: macOS arm64 full
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: julia-actions/setup-julia@v2
        with:
          version: "1.12"
      - uses: julia-actions/cache@v2
      - name: Build
        run: julia --project=. -e 'using Pkg; Pkg.build()'
      - name: Test
        run: julia --project=. -e 'using Pkg; Pkg.test()'

  linux-smoke:
    name: Linux smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: julia-actions/setup-julia@v2
        with:
          version: "1.12"
      - uses: julia-actions/cache@v2
      - name: Build
        run: julia --project=. -e 'using Pkg; Pkg.build()'
      - name: Smoke
        run: julia --project=. --compiled-modules=no -e 'using Cxx'

  windows-smoke:
    name: Windows smoke
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: julia-actions/setup-julia@v2
        with:
          version: "1.12"
      - uses: julia-actions/cache@v2
      - name: Toolchain info
        shell: bash
        run: |
          command -v clang++.exe
          clang++.exe --version
          clang++.exe -print-search-dirs
          command -v gcc.exe || true
          command -v ld.lld.exe || true
          command -v llvm-nm.exe || true
          for d in \
            /c/hostedtoolcache/windows/julia/1.12.6/x64/lib \
            /c/hostedtoolcache/windows/julia/1.12.6/x64/lib/julia \
            /c/mingw64/x86_64-w64-mingw32/lib \
            /c/mingw64/lib/gcc/x86_64-w64-mingw32/*; do
            ls "$d"/libmsvcrt.a 2>/dev/null && echo "libmsvcrt.a in $d"
          done
          llvm-nm.exe /c/mingw64/x86_64-w64-mingw32/lib/libmsvcrt.a 2>/dev/null | rg '_initterm_e' || true
          llvm-nm.exe /c/mingw64/x86_64-w64-mingw32/lib/libucrt.a 2>/dev/null | rg '_initterm_e' || true
      - name: Build
        shell: bash
        env:
          WINDOWS_CLANG_VERBOSE: "1"
        run: julia --project=. -e 'using Pkg; Pkg.build()'
      - name: Smoke
        shell: bash
        run: julia --project=. --compiled-modules=no -e 'using Cxx'
