name: CI

on:
  push:
    branches:
      - main
      - master
      - julia-modernization-followup
      - "feature/**"
  pull_request:

jobs:
  macos-arm64:
    name: macOS arm64 full (Julia ${{ matrix.julia-version }})
    runs-on: macos-14
    strategy:
      fail-fast: false
      matrix:
        julia-version: ["lts", "1"]
    steps:
      - uses: actions/checkout@v4
      - uses: julia-actions/setup-julia@v2
        with:
          version: ${{ matrix.julia-version }}
      - uses: julia-actions/cache@v2
      - name: Build
        run: julia --project=. -e 'using Pkg; Pkg.build()'
      - name: Test
        run: julia --project=. -e 'using Pkg; Pkg.test()'

  linux-smoke:
    name: Linux smoke (Julia ${{ matrix.julia-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        julia-version: ["lts", "1"]
    steps:
      - uses: actions/checkout@v4
      - uses: julia-actions/setup-julia@v2
        with:
          version: ${{ matrix.julia-version }}
      - uses: julia-actions/cache@v2
      - name: Build
        run: julia --project=. -e 'using Pkg; Pkg.build()'
      - name: Smoke
        run: julia --project=. --compiled-modules=no -e 'using Cxx'
